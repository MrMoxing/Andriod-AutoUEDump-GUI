name: Android CMake Build (.so 32/64bit)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r26d
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK (for CMake+NDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        unzip android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        mv android-ndk-${ANDROID_NDK_VERSION} $ANDROID_NDK_HOME

    - name: Build armeabi-v7a (.so, 32-bit)
      run: |
        mkdir -p build-armeabi-v7a
        cd build-armeabi-v7a
        cmake \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=armeabi-v7a \
          -DANDROID_PLATFORM=android-24 \
          ..
        cmake --build . --config Release

    - name: Build arm64-v8a (.so, 64-bit)
      run: |
        mkdir -p build-arm64-v8a
        cd build-arm64-v8a
        cmake \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          ..
        cmake --build . --config Release

    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      with:
        name: android-libs
        path: |
          build-armeabi-v7a/**/*.so
          build-arm64-v8a/**/*.so
